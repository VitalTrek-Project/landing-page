
<!-- 
     testimonials — user quotes from agencies and tourists
-->
<section class="testimonials" id="testimonials" aria-labelledby="testimonials-heading">

  <span class="section-tag" data-i18n="testimonials.tag">Testimonies</span>
  <h2 id="testimonials-heading" data-i18n="testimonials.title">What our users say</h2>
  <p class="testimonials-sub" data-i18n="testimonials.subtitle">
    Agencies and adventurers who are already familiar with VitalTrek share their perspective.
  </p>

  <div class="testi-grid" role="list" aria-label="User testimonials">

    <figure class="testi-card" role="listitem">
      <div class="testi-stars" aria-label="5 out of 5 stars">★★★★★</div>
      <div class="testi-quote" aria-hidden="true">"</div>
      <blockquote>
        <p class="testi-text" data-i18n="testimonials.quote-mendoza">
          "As an agency, the hardest part was always knowing our groups were safe when there was
          no signal. With VitalTrek, that fear disappears. The Bluetooth checkpoints are fantastic."
        </p>
      </blockquote>
      <figcaption class="testi-author">
        <strong data-i18n="testimonials.name-mendoza">Carlos Mendoza</strong>
        <span data-i18n="testimonials.role-mendoza">Director of Operations · AventurAndes Tours</span>
      </figcaption>
      <span class="testi-tag" data-i18n="testimonials.label-mendoza">Agency</span>
    </figure>

    <figure class="testi-card" role="listitem">
      <div class="testi-stars" aria-label="5 out of 5 stars">★★★★★</div>
      <div class="testi-quote" aria-hidden="true">"</div>
      <blockquote>
        <p class="testi-text" data-i18n="testimonials.quote-reyes">
          "I did the 4-day Choquequirao trek and the automatic journal it generated at the end
          was incredible. Photos, routes, my vital signs at each point. I wouldn't have documented
          it the same way on my own."
        </p>
      </blockquote>
      <figcaption class="testi-author">
        <strong data-i18n="testimonials.name-reyes">Sofia Reyes</strong>
        <span data-i18n="testimonials.role-reyes">Independent Trekker · Lima</span>
      </figcaption>
      <span class="testi-tag" data-i18n="testimonials.label-reyes">Adventuress</span>
    </figure>

    <figure class="testi-card" role="listitem">
      <div class="testi-stars" aria-label="5 out of 5 stars">★★★★★</div>
      <div class="testi-quote" aria-hidden="true">"</div>
      <blockquote>
        <p class="testi-text" data-i18n="testimonials.quote-quispe">
          "Our foreign clients often ask us about security in remote areas. Showing them the
          real-time monitoring panel closes sales that we previously lost due to that fear."
        </p>
      </blockquote>
      <figcaption class="testi-author">
        <strong data-i18n="testimonials.name-quispe">Marco Quispe</strong>
        <span data-i18n="testimonials.role-quispe">CEO · Condor Expeditions Cusco</span>
      </figcaption>
      <span class="testi-tag" data-i18n="testimonials.label-quispe">Agency</span>
    </figure>

  </div>

</section>
